name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: Release please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-server:
    name: Build server artifact
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p vloxximity-server --release --locked
      - name: Package server
        run: |
          mkdir -p dist
          tar -C target/release -czf "dist/vloxximity-server-${{ needs.release-please.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz" vloxximity-server
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  build-client:
    name: Build client artifact
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p vloxximity-client --target x86_64-pc-windows-msvc --release --locked
      - name: Stage DLL
        shell: bash
        run: |
          mkdir -p dist
          cp "target/x86_64-pc-windows-msvc/release/vloxximity_client.dll" "dist/vloxximity_client-${{ needs.release-please.outputs.version }}-x86_64-pc-windows-msvc.dll"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*
